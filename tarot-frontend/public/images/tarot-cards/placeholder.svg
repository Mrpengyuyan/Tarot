<svg width="150" height="250" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="150" height="250" fill="#1a1a2e"/>

  <!-- 边框 -->
  <rect x="5" y="5" width="140" height="240" fill="none" stroke="#d4af37" stroke-width="2" rx="8"/>

  <!-- 内边框 -->
  <rect x="10" y="10" width="130" height="230" fill="none" stroke="#d4af37" stroke-width="1" stroke-opacity="0.5" rx="6"/>

  <!-- 装饰圆圈 -->
  <circle cx="75" cy="125" r="30" fill="none" stroke="#d4af37" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="75" cy="125" r="40" fill="none" stroke="#d4af37" stroke-width="1" stroke-opacity="0.3"/>

  <!-- 水晶球图标 -->
  <circle cx="75" cy="125" r="20" fill="#d4af37" fill-opacity="0.2"/>
  <text x="75" y="135" font-family="Arial, sans-serif" font-size="30" text-anchor="middle" fill="#d4af37">🔮</text>

  <!-- 文字 -->
  <text x="75" y="180" font-family="Cinzel, serif" font-size="14" text-anchor="middle" fill="#d4af37" fill-opacity="0.8">塔罗牌</text>
  <text x="75" y="200" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#d4af37" fill-opacity="0.6">TAROT CARD</text>
</svg>
